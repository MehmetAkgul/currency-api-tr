name: Update BDT Fuel Prices

on:
  schedule:
    # Her ayin 1'i 10:00 UTC — stale kontrol + updated_at refresh
    - cron: '0 10 1 * *'
  workflow_dispatch:

concurrency:
  group: fuel-bdt-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Refresh BDT diesel prices (stale check + updated_at)
        run: node scripts/fetch-fuel-bdt.js
        env:
          GIT_AUTHOR_NAME: currency-api-bot
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: currency-api-bot
          GIT_COMMITTER_EMAIL: actions@github.com

      - name: Warn if stale
        run: |
          IS_STALE=$(node -e "const d=require('./v1/fuel/bdt-diesel.json'); process.stdout.write(String(d.is_stale))")
          if [ "$IS_STALE" = "true" ]; then
            echo "::warning::bdt-diesel.json is STALE — manually_updated is older than 30 days. Update scripts/fetch-fuel-bdt.js BASELINE_DATA."
          fi
