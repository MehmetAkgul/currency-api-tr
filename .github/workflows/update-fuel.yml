name: Update EU Fuel Prices

on:
  schedule:
    # Her Perşembe 12:00 UTC (EC bulletin Perşembe yayınlanır)
    - cron: '0 12 * * 4'
    # Pazar yedek run (stale kontrol)
    - cron: '0 8 * * 0'
  workflow_dispatch:

concurrency:
  group: fuel-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch EU diesel prices
        run: node scripts/fetch-fuel-eu.js
        env:
          GIT_AUTHOR_NAME: currency-api-bot
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: currency-api-bot
          GIT_COMMITTER_EMAIL: actions@github.com
